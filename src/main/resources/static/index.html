<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Job Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
        }
        .navbar-brand {
            color: #00d4ff !important;
            font-weight: 700;
            font-size: 1.4rem;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 8px;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #0099cc, #007aa3);
        }
        .btn-danger {
            border-radius: 8px;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-Applied {
            background: #e3f2fd;
            color: #1565c0;
        }
        .status-Interview {
            background: #fff3e0;
            color: #e65100;
        }
        .status-Offer {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status-Rejected {
            background: #ffebee;
            color: #c62828;
        }
        #loginSection {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
        }
        .ai-feedback {
            background: #f8f9ff;
            border-left: 4px solid #00d4ff;
            padding: 12px;
            border-radius: 0 8px 8px 0;
            font-size: 0.85rem;
            white-space: pre-wrap;
        }
        .table th {
            background-color: #1a1a2e;
            color: white;
        }
        #dashboardSection { display: none; }
    </style>
</head>
<body>

<!-- LOGIN SECTION -->
<div id="loginSection">
    <div class="login-card">
        <div class="card p-4">
            <h3 class="text-center mb-1 fw-bold">🎯 AI Job Tracker</h3>
            <p class="text-center text-muted mb-4">Track your applications smartly</p>
            <div id="loginError" class="alert alert-danger d-none"></div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter username">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter password">
            </div>
            <button class="btn btn-primary w-100 mb-2" onclick="login()">Login</button>
            <button class="btn btn-outline-secondary w-100" onclick="register()">Register</button>
        </div>
    </div>
</div>

<!-- DASHBOARD SECTION -->
<div id="dashboardSection">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg px-4 py-3">
        <span class="navbar-brand">🎯 AI Job Tracker</span>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-white" id="welcomeUser"></span>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container py-4">

        <!-- Stats Row -->
        <div class="row mb-4 g-3">
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <h4 class="fw-bold text-primary mb-0" id="totalCount">0</h4>
                    <small class="text-muted">Total Applied</small>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <h4 class="fw-bold text-warning mb-0" id="interviewCount">0</h4>
                    <small class="text-muted">Interviews</small>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <h4 class="fw-bold text-success mb-0" id="offerCount">0</h4>
                    <small class="text-muted">Offers</small>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card p-3 text-center">
                    <h4 class="fw-bold text-danger mb-0" id="rejectedCount">0</h4>
                    <small class="text-muted">Rejected</small>
                </div>
            </div>
        </div>

        <!-- Add Job Form -->
        <div class="card p-4 mb-4">
            <h5 class="fw-bold mb-3">➕ Add New Application</h5>
            <div class="row g-3">
                <div class="col-md-3">
                    <input type="text" id="company" class="form-control" placeholder="Company name">
                </div>
                <div class="col-md-3">
                    <input type="text" id="role" class="form-control" placeholder="Job role">
                </div>
                <div class="col-md-2">
                    <select id="status" class="form-select">
                        <option value="Applied">Applied</option>
                        <option value="Interview">Interview</option>
                        <option value="Offer">Offer</option>
                        <option value="Rejected">Rejected</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <input type="date" id="dateApplied" class="form-control">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="addJob()">
                        Add + Analyze
                    </button>
                </div>
                <div class="col-12">
                    <textarea id="jobDescription" class="form-control" rows="3"
                              placeholder="Paste job description here for AI skill gap analysis..."></textarea>
                </div>
            </div>
        </div>

        <!-- Jobs Table -->
        <div class="card p-4">
            <h5 class="fw-bold mb-3">📋 My Applications</h5>
            <div id="loadingMsg" class="text-center text-muted py-3">Loading...</div>
            <div class="table-responsive">
                <table class="table table-hover align-middle" id="jobsTable" style="display:none">
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Company</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>AI Feedback</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="jobsBody"></tbody>
                </table>
            </div>
            <div id="noJobs" class="text-center text-muted py-4" style="display:none">
                No applications yet. Add your first one above! 🚀
            </div>
        </div>
    </div>
</div>

<script>
    let token = '';
    let currentUser = '';

    // Set today's date as default
    document.getElementById('dateApplied').valueAsDate = new Date();

    async function register() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!username || !password) {
            showLoginError('Please enter username and password');
            return;
        }
        try {
            const res = await fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const text = await res.text();
            if (res.ok) {
                showLoginError('Registered! Now login.', 'success');
            } else {
                showLoginError('Registration failed: ' + text);
            }
        } catch (e) {
            showLoginError('Error: ' + e.message);
        }
    }

    async function login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        if (!username || !password) {
            showLoginError('Please enter username and password');
            return;
        }
        try {
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok && data.token) {
                token = data.token;
                currentUser = username;
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
                document.getElementById('welcomeUser').textContent = '👤 ' + username;
                loadJobs();
            } else {
                showLoginError('Invalid username or password');
            }
        } catch (e) {
            showLoginError('Error: ' + e.message);
        }
    }

    function logout() {
        token = '';
        currentUser = '';
        document.getElementById('loginSection').style.display = 'flex';
        document.getElementById('dashboardSection').style.display = 'none';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
    }

    async function loadJobs() {
        try {
            const res = await fetch('/api/jobs', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const jobs = await res.json();
            renderJobs(jobs);
            updateStats(jobs);
        } catch (e) {
            console.error('Error loading jobs:', e);
        }
    }

    async function addJob() {
        const company = document.getElementById('company').value.trim();
        const role = document.getElementById('role').value.trim();
        const status = document.getElementById('status').value;
        const dateApplied = document.getElementById('dateApplied').value;
        const jobDescription = document.getElementById('jobDescription').value.trim();

        if (!company || !role) {
            alert('Please enter company and role');
            return;
        }

        const btn = document.querySelector('button[onclick="addJob()"]');
        btn.textContent = 'Analyzing...';
        btn.disabled = true;

        try {
            const res = await fetch('/api/jobs', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ company, role, status, dateApplied, jobDescription })
            });

            if (res.ok) {
                document.getElementById('company').value = '';
                document.getElementById('role').value = '';
                document.getElementById('jobDescription').value = '';
                loadJobs();
            }
        } catch (e) {
            alert('Error adding job: ' + e.message);
        } finally {
            btn.textContent = 'Add + Analyze';
            btn.disabled = false;
        }
    }

    async function deleteJob(id) {
        if (!confirm('Delete this application?')) return;
        try {
            await fetch('/api/jobs/' + id, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            loadJobs();
        } catch (e) {
            alert('Error deleting job');
        }
    }

    async function updateStatus(id, status) {
        try {
            await fetch('/api/jobs/' + id, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ status })
            });
            loadJobs();
        } catch (e) {
            alert('Error updating status');
        }
    }

    function renderJobs(jobs) {
        const tbody = document.getElementById('jobsBody');
        const table = document.getElementById('jobsTable');
        const noJobs = document.getElementById('noJobs');
        const loading = document.getElementById('loadingMsg');

        loading.style.display = 'none';

        if (jobs.length === 0) {
            table.style.display = 'none';
            noJobs.style.display = 'block';
            return;
        }

        table.style.display = 'table';
        noJobs.style.display = 'none';

        tbody.innerHTML = jobs.map((job, index) => `
            <tr>
                <td>${index + 1}</td>
                <td><strong>${job.company}</strong></td>
                <td>${job.role}</td>
                <td>
                    <select class="form-select form-select-sm status-badge status-${job.status}"
                        onchange="updateStatus(${job.id}, this.value)" style="width:120px">
                        <option ${job.status === 'Applied' ? 'selected' : ''}>Applied</option>
                        <option ${job.status === 'Interview' ? 'selected' : ''}>Interview</option>
                        <option ${job.status === 'Offer' ? 'selected' : ''}>Offer</option>
                        <option ${job.status === 'Rejected' ? 'selected' : ''}>Rejected</option>
                    </select>
                </td>
                <td>${job.dateApplied || '-'}</td>
                <td>
                    ${job.aiFeedback ?
            `<div class="ai-feedback">${job.aiFeedback}</div>` :
            '<span class="text-muted">No JD provided</span>'
        }
                </td>
                <td>
                    <button class="btn btn-danger btn-sm"
                        onclick="deleteJob(${job.id})">Delete</button>
                </td>
            </tr>
        `).join('');
    }

    function updateStats(jobs) {
        document.getElementById('totalCount').textContent = jobs.length;
        document.getElementById('interviewCount').textContent =
            jobs.filter(j => j.status === 'Interview').length;
        document.getElementById('offerCount').textContent =
            jobs.filter(j => j.status === 'Offer').length;
        document.getElementById('rejectedCount').textContent =
            jobs.filter(j => j.status === 'Rejected').length;
    }

    function showLoginError(msg, type = 'danger') {
        const el = document.getElementById('loginError');
        el.textContent = msg;
        el.className = `alert alert-${type}`;
        el.classList.remove('d-none');
    }
</script>
</body>
</html>
